extensions:
  custom_models: []
  integrations: []
  plugins: []
models:
  embeddings:
    gpu_required: false
    memory_gb: 2
    name: tasal9/Multilingual-ZamAI-Embeddings
    type: embeddings
  llama3:
    gpu_required: true
    memory_gb: 8
    name: tasal9/ZamAI-LIama3-Pashto
    type: language_model
  mistral_edu:
    gpu_required: true
    memory_gb: 14
    name: tasal9/ZamAI-Mistral-7B-Pashto
    type: language_model
  phi3_business:
    gpu_required: true
    memory_gb: 8
    name: tasal9/ZamAI-Phi-3-Mini-Pashto
    type: language_model
  whisper:
    gpu_required: false
    memory_gb: 2
    name: tasal9/ZamAI-Whisper-v3-Pashto
    type: speech_recognition
platform:
  environment: development
  name: ZamAI Pro Models Platform
  version: 2.0.0
services:
  api_gateway:
    enabled: true
    models:
    - all
    port: 8000
    scaling:
      max_instances: 1
      min_instances: 1
  business_tools:
    enabled: true
    models:
    - phi3_business
    - embeddings
    port: 7866
    scaling:
      max_instances: 2
      min_instances: 1
  tutor_bot:
    enabled: true
    models:
    - mistral_edu
    port: 7865
    scaling:
      max_instances: 2
      min_instances: 1
  voice_assistant:
    enabled: true
    models:
    - whisper
    - llama3
    port: 7861
    scaling:
      max_instances: 3
      min_instances: 1
