version: '3.8'

services:
  zamai-business-tools:
    build:
      context: ../..
      dockerfile: docker/business-tools/Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN}
        PHI3_MODEL: ${PHI3_BUSINESS_MODEL:-tasal9/ZamAI-Phi-3-Mini-Pashto}
        EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-tasal9/Multilingual-ZamAI-Embeddings}
    
    ports:
      - "7866:7866"
    
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - PHI3_BUSINESS_MODEL=${PHI3_BUSINESS_MODEL}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL}
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7866
    
    volumes:
      - business_data:/app/business_data
      - ./logs:/app/logs
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7866/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    networks:
      - zamai-network

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - zamai-network

  # Monitoring with Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped
    networks:
      - zamai-network

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - zamai-network

volumes:
  business_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  zamai-network:
    driver: bridge
