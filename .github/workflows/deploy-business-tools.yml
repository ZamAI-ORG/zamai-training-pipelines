name: Deploy Business Tools CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'demos/enhanced_business_tools.py'
      - 'business_tools/**'
      - 'docker/business-tools/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'demos/enhanced_business_tools.py'
      - 'business_tools/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zamai-business-tools

jobs:
  test-business-tools:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black
        
    - name: Lint code
      run: |
        flake8 demos/enhanced_business_tools.py --max-line-length=100
        black --check demos/enhanced_business_tools.py
        
    - name: Run business tools tests
      run: |
        python -m pytest tests/test_business_tools.py -v --cov=demos/enhanced_business_tools
        
    - name: Test document processing
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        PHI3_BUSINESS_MODEL: tasal9/ZamAI-Phi-3-Mini-Pashto
        EMBEDDINGS_MODEL: tasal9/Multilingual-ZamAI-Embeddings
      run: |
        python -c "
        import sys
        sys.path.append('demos')
        from enhanced_business_tools import BusinessDocumentProcessor
        processor = BusinessDocumentProcessor()
        result = processor.process_business_document('Test document', 'General', 'Information Extraction')
        assert 'analysis' in result or 'error' in result
        print('✅ Business tools test passed')
        "

  build-docker-image:
    needs: test-business-tools
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/business-tools/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          PHI3_MODEL=tasal9/ZamAI-Phi-3-Mini-Pashto
          EMBEDDINGS_MODEL=tasal9/Multilingual-ZamAI-Embeddings

  deploy-to-staging:
    needs: build-docker-image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment: staging
    
    steps:
    - name: Deploy to staging
      run: |
        echo "🚀 Deploying Business Tools to staging environment"
        echo "Image: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"
        
        # In a real deployment, you would:
        # 1. Connect to your staging server
        # 2. Pull the new image
        # 3. Update the running container
        # 4. Run health checks
        
        # Example deployment commands:
        # ssh staging-server "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"
        # ssh staging-server "docker stop zamai-business-tools || true"
        # ssh staging-server "docker run -d --name zamai-business-tools -p 7866:7866 ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"
        
        echo "✅ Staging deployment completed"

  deploy-to-production:
    needs: [build-docker-image, deploy-to-staging]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment: production
    
    steps:
    - name: Deploy to production
      run: |
        echo "🌟 Deploying Business Tools to production environment"
        echo "Image: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest"
        
        # Production deployment with zero downtime
        # 1. Health check current production
        # 2. Deploy new version alongside
        # 3. Run integration tests
        # 4. Switch traffic to new version
        # 5. Remove old version
        
        echo "✅ Production deployment completed"
        
    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: |
          🏢 ZamAI Business Tools Deployment Status: ${{ job.status }}
          📦 Image: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
          🌐 Environment: Production
          📊 Commit: ${{ github.sha }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  update-documentation:
    needs: deploy-to-production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Update deployment documentation
      run: |
        echo "📝 Updating deployment documentation"
        
        # Update deployment timestamp
        echo "Last deployment: $(date -u)" >> DEPLOYMENT_LOG.md
        echo "Commit: ${{ github.sha }}" >> DEPLOYMENT_LOG.md
        echo "Image: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest" >> DEPLOYMENT_LOG.md
        echo "---" >> DEPLOYMENT_LOG.md
        
    - name: Commit documentation updates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add DEPLOYMENT_LOG.md
        git commit -m "📝 Update deployment log [skip ci]" || exit 0
        git push

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run security audit
      run: |
        pip install safety bandit
        
        # Check for known vulnerabilities
        safety check -r requirements.txt
        
        # Static security analysis
        bandit -r demos/enhanced_business_tools.py -f json -o security-report.json || true
        
    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: security-report.json

  performance-test:
    needs: test-business-tools
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install locust
        
    - name: Run performance tests
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        echo "🏃‍♂️ Running performance tests for Business Tools"
        
        # Start the business tools service in background
        python demos/enhanced_business_tools.py &
        SERVICE_PID=$!
        
        # Wait for service to start
        sleep 30
        
        # Run basic performance test
        python -c "
        import requests
        import time
        
        # Test document processing endpoint
        start_time = time.time()
        # Your performance test logic here
        end_time = time.time()
        
        print(f'⏱️ Performance test completed in {end_time - start_time:.2f}s')
        "
        
        # Clean up
        kill $SERVICE_PID || true
